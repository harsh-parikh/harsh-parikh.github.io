<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toddler Drums</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #1a1a30 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    height: 100vh;
    width: 100vw;
  }

  /* Starfield */
  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .star { position: absolute; border-radius: 50%; animation: twinkle 2s ease-in-out infinite alternate; }
  @keyframes twinkle { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }

  /* ─── Splash ──────────────────────────── */
  #splash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #e17055 0%, #d63031 50%, #b71540 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; cursor: pointer; transition: opacity 0.5s;
  }
  #splash h1 { font-size: clamp(2rem,6vw,5rem); color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 1rem; animation: bounce 1.5s ease-in-out infinite; }
  #splash p { font-size: clamp(1rem,2.5vw,1.8rem); color: rgba(255,255,255,0.85); animation: pulse 2s ease-in-out infinite; }
  .splash-drums { display: flex; gap: clamp(10px,2vw,24px); margin: 2rem 0; align-items: flex-end; }
  .splash-drum { border-radius: 50%; box-shadow: 0 6px 20px rgba(0,0,0,0.3); animation: drumBounce 1.2s ease-in-out infinite; }
  .splash-drum:nth-child(1) { width: clamp(40px,5vw,60px); height: clamp(40px,5vw,60px); background: #FFD1D1; animation-delay: 0s; }
  .splash-drum:nth-child(2) { width: clamp(55px,7vw,85px); height: clamp(55px,7vw,85px); background: #D1ECFF; animation-delay: 0.15s; }
  .splash-drum:nth-child(3) { width: clamp(70px,9vw,110px); height: clamp(70px,9vw,110px); background: #FFF3C4; animation-delay: 0.3s; }
  .splash-drum:nth-child(4) { width: clamp(55px,7vw,85px); height: clamp(55px,7vw,85px); background: #D4F5D4; animation-delay: 0.45s; }
  .splash-drum:nth-child(5) { width: clamp(40px,5vw,60px); height: clamp(40px,5vw,60px); background: #E8D5F5; animation-delay: 0.6s; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  @keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
  @keyframes drumBounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  /* ─── Control Buttons ─────────────────── */
  #lock-btn {
    position: fixed; top: 16px; right: 16px; z-index: 500;
    width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; opacity: 0; pointer-events: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  #lock-btn.visible { opacity: 1; pointer-events: auto; }
  #lock-btn.unlocked { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); color: rgba(255,255,255,0.7); }
  #lock-btn.locked { background: #e74c3c; color: white; animation: lockPulse 2s ease-in-out infinite; }
  @keyframes lockPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); } 50% { box-shadow: 0 0 0 10px rgba(231,76,60,0); } }

  #fullscreen-btn {
    position: fixed; bottom: 16px; right: 16px; z-index: 500;
    width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; opacity: 0; pointer-events: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    background: linear-gradient(135deg, #e17055 0%, #d63031 100%); color: white;
  }
  #fullscreen-btn.visible { opacity: 1; pointer-events: auto; }
  #fullscreen-btn:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(225,112,85,0.5); }
  #fullscreen-btn.hidden-fs { display: none; }

  /* ─── 3D Drum Kit Stage ───────────────── */
  #stage {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10;
    perspective: 900px;
    perspective-origin: 50% 95%;
  }
  #kit {
    position: absolute;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transform: rotateX(35deg);
    transform-origin: 50% 100%;
  }

  /* ─── Drum Piece Base ─────────────────── */
  .drum-piece {
    position: absolute;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: filter 0.06s;
  }
  .drum-piece:hover { filter: brightness(1.06); }
  .drum-piece.hit .drum-head { filter: brightness(1.35) saturate(1.4); transform: scale(0.94); }
  .drum-piece.hit .cymbal-disc { filter: brightness(1.3) saturate(1.3); }

  /* ─── Drum Heads (round, seen from above at angle) ── */
  .drum-head {
    position: absolute;
    border-radius: 50%;
    transition: transform 0.08s, filter 0.08s;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
  }
  .drum-head-label {
    font-weight: 700; pointer-events: none; text-align: center;
    color: rgba(0,0,0,0.2); line-height: 1.2;
    font-size: clamp(0.6rem, 1.2vw, 1rem);
  }
  .drum-head-emoji {
    pointer-events: none;
    font-size: clamp(1.2rem, 2.5vw, 2.5rem);
    margin-bottom: 2px;
  }

  /* Drum shell (the cylinder side) */
  .drum-shell {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  /* ─── Cymbal ──────────────────────────── */
  .cymbal-disc {
    position: absolute;
    border-radius: 50%;
    transition: transform 0.08s, filter 0.08s;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    cursor: pointer;
  }
  .cymbal-bell {
    width: 18%; height: 18%;
    border-radius: 50%;
    position: absolute;
    pointer-events: none;
  }
  .cymbal-stand {
    position: absolute;
    pointer-events: none;
    border-radius: 2px;
  }

  /* ─── Kick Drum (facing us) ───────────── */
  .kick-shell {
    position: absolute;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    cursor: pointer;
    transition: transform 0.08s, filter 0.08s;
  }
  .kick-head {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .kick-port {
    width: 22%; height: 22%;
    border-radius: 50%;
    position: absolute;
    pointer-events: none;
  }

  /* ─── Hi-Hat Pedal ────────────────────── */
  .pedal {
    position: absolute;
    border-radius: 4px;
    pointer-events: none;
  }

  /* ─── Effects ─────────────────────────── */
  .hit-ripple {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 100;
    animation: hitRipple 0.7s ease-out forwards;
  }
  @keyframes hitRipple { 0% { transform: scale(0); opacity: 0.55; } 100% { transform: scale(3.5); opacity: 0; } }
  .hit-emoji {
    position: fixed; pointer-events: none; z-index: 200; font-size: 2.5rem;
    animation: emojiPop 1.2s ease-out forwards;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }
  @keyframes emojiPop { 0% { opacity:1; transform: scale(0.5) translateY(0); } 30% { transform: scale(1.3) translateY(-40px); } 100% { opacity:0; transform: scale(1) translateY(-160px) rotate(15deg); } }
  .shockwave {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 99; border: 3px solid;
    animation: shockExpand 0.6s ease-out forwards;
  }
  @keyframes shockExpand { 0% { transform: scale(0.3); opacity: 0.7; } 100% { transform: scale(2.5); opacity: 0; } }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- Splash -->
<div id="splash">
  <h1>Toddler Drums</h1>
  <div class="splash-drums">
    <div class="splash-drum"></div><div class="splash-drum"></div><div class="splash-drum"></div><div class="splash-drum"></div><div class="splash-drum"></div>
  </div>
  <p>Tap or click anywhere to start!</p>
</div>

<!-- Controls -->
<button id="lock-btn" class="unlocked" title="Lock fullscreen">
  <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
    <path id="lock-path" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z"/>
  </svg>
</button>
<button id="fullscreen-btn" title="Enter fullscreen">
  <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
  </svg>
</button>

<!-- 3D Stage -->
<div id="stage">
  <div id="kit"></div>
</div>

<script>
// ─── Audio ───────────────────────────────────────────────────
let audioCtx = null;
function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ─── Drum sound synthesizers ─────────────────────────────────
function playKick(ctx) {
  const now = ctx.currentTime;
  const o = ctx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(160, now); o.frequency.exponentialRampToValueAtTime(35, now + 0.12);
  const g = ctx.createGain(); g.gain.setValueAtTime(0.7, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
  o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.5);
  const o2 = ctx.createOscillator(); o2.type = 'sine';
  o2.frequency.setValueAtTime(80, now); o2.frequency.exponentialRampToValueAtTime(30, now + 0.15);
  const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.5, now); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  o2.connect(g2); g2.connect(ctx.destination); o2.start(now); o2.stop(now + 0.3);
  noiseBurst(ctx, 0.01, 0.2);
}
function playSnare(ctx) {
  const now = ctx.currentTime;
  const o = ctx.createOscillator(); o.type = 'triangle';
  o.frequency.setValueAtTime(200, now); o.frequency.exponentialRampToValueAtTime(120, now + 0.08);
  const g = ctx.createGain(); g.gain.setValueAtTime(0.4, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.15);
  const bSz = ctx.sampleRate * 0.2; const buf = ctx.createBuffer(1, bSz, ctx.sampleRate);
  const d = buf.getChannelData(0); for (let i=0;i<bSz;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/bSz,1.5);
  const s = ctx.createBufferSource(); s.buffer = buf;
  const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=3000;
  const ng = ctx.createGain(); ng.gain.setValueAtTime(0.3,now); ng.gain.exponentialRampToValueAtTime(0.001,now+0.2);
  s.connect(hp); hp.connect(ng); ng.connect(ctx.destination); s.start(now); s.stop(now+0.2);
}
function playTom(ctx, baseFreq, decay) {
  const now = ctx.currentTime;
  const o = ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(baseFreq, now); o.frequency.exponentialRampToValueAtTime(baseFreq*0.4, now+decay*0.5);
  const g = ctx.createGain(); g.gain.setValueAtTime(0.5,now); g.gain.exponentialRampToValueAtTime(0.001,now+decay);
  o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+decay);
  noiseBurst(ctx, 0.02, 0.15);
}
function playCrash(ctx) {
  const now = ctx.currentTime;
  const bSz = ctx.sampleRate*0.8; const buf = ctx.createBuffer(1,bSz,ctx.sampleRate);
  const d = buf.getChannelData(0); for(let i=0;i<bSz;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/bSz,0.5);
  const s = ctx.createBufferSource(); s.buffer=buf;
  const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=4000;
  const g = ctx.createGain(); g.gain.setValueAtTime(0.35,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.8);
  s.connect(hp); hp.connect(g); g.connect(ctx.destination); s.start(now); s.stop(now+0.8);
}
function playHiHat(ctx) {
  const now = ctx.currentTime;
  const bSz = ctx.sampleRate*0.12; const buf = ctx.createBuffer(1,bSz,ctx.sampleRate);
  const d = buf.getChannelData(0); for(let i=0;i<bSz;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/bSz,2.5);
  const s = ctx.createBufferSource(); s.buffer=buf;
  const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7000;
  const g = ctx.createGain(); g.gain.setValueAtTime(0.25,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
  s.connect(hp); hp.connect(g); g.connect(ctx.destination); s.start(now); s.stop(now+0.12);
}
function playRide(ctx) {
  const now = ctx.currentTime;
  const bSz = ctx.sampleRate*0.5; const buf = ctx.createBuffer(1,bSz,ctx.sampleRate);
  const d = buf.getChannelData(0); for(let i=0;i<bSz;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/bSz,1.5);
  const s = ctx.createBufferSource(); s.buffer=buf;
  const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=5500; bp.Q.value=1.5;
  const g = ctx.createGain(); g.gain.setValueAtTime(0.22,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
  s.connect(bp); bp.connect(g); g.connect(ctx.destination); s.start(now); s.stop(now+0.5);
  const o = ctx.createOscillator(); o.type='sine'; o.frequency.value=800;
  const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.06,now); g2.gain.exponentialRampToValueAtTime(0.001,now+0.3);
  o.connect(g2); g2.connect(ctx.destination); o.start(now); o.stop(now+0.3);
}
function playCowbell(ctx) {
  const now = ctx.currentTime;
  const o1 = ctx.createOscillator(); o1.type='square'; o1.frequency.value=587;
  const o2 = ctx.createOscillator(); o2.type='square'; o2.frequency.value=845;
  const g = ctx.createGain(); g.gain.setValueAtTime(0.15,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
  const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=700; bp.Q.value=3;
  o1.connect(bp); o2.connect(bp); bp.connect(g); g.connect(ctx.destination);
  o1.start(now); o2.start(now); o1.stop(now+0.3); o2.stop(now+0.3);
}
function noiseBurst(ctx, dur, vol) {
  const now = ctx.currentTime;
  const bSz = ctx.sampleRate*dur; const buf = ctx.createBuffer(1,bSz,ctx.sampleRate);
  const d = buf.getChannelData(0); for(let i=0;i<bSz;i++) d[i]=(Math.random()*2-1)*(1-i/bSz);
  const s = ctx.createBufferSource(); s.buffer=buf;
  const g = ctx.createGain(); g.gain.setValueAtTime(vol,now);
  s.connect(g); g.connect(ctx.destination); s.start(now); s.stop(now+dur);
}

// ─── Drum Kit Layout (first-person drummer view) ─────────────
// Positions in % of stage width/height. The 3D rotateX on #kit
// gives perspective depth — things higher on screen appear further away.
//
// Layout from drummer's seat:
//   Far back: crash (left), ride (right), cowbell (center-right)
//   Mid:      hi-hat (left), high tom (center-left), mid tom (center-right)
//   Near:     snare (left of center), floor tom (right)
//   Closest:  kick drum (center, big)

const DRUMS = [
  // ── Cymbals (far, overhead) ──
  { id:'crash',   name:'Crash',     type:'cymbal', x:22, y:12, size:18, color:['#FFFDD1','#FFF3A3'], glow:'#FFF3C4', play: playCrash },
  { id:'hihat',   name:'Hi-Hat',    type:'cymbal', x:25, y:32, size:12, color:['#E8D5F5','#D1BFEE'], glow:'#D9BAFF', play: playHiHat },
  { id:'ride',    name:'Ride',      type:'cymbal', x:76, y:10, size:20, color:['#D5E8FF','#B8D4FF'], glow:'#BAD4FF', play: playRide },
  { id:'cowbell', name:'Cowbell',   type:'cymbal', x:58, y:18, size:7,  color:['#FFF0D1','#FFE0A8'], glow:'#FFD9BA', play: playCowbell },
  // ── Toms (mounted, mid-distance) ──
  { id:'hitom',   name:'High\nTom', type:'tom', x:40, y:28, size:14, depth:7,  color:['#FFD1D1','#FFBABA'], glow:'#FFB3BA', play: c => playTom(c, 300, 0.3) },
  { id:'midtom',  name:'Mid\nTom',  type:'tom', x:58, y:26, size:15, depth:8,  color:['#D4F5D4','#B8EDC0'], glow:'#BAFFC9', play: c => playTom(c, 220, 0.35) },
  // ── Snare (center-left, close) ──
  { id:'snare',   name:'Snare',     type:'tom', x:36, y:52, size:17, depth:6,  color:['#FFE0C2','#FFD1A8'], glow:'#FFDFBA', play: playSnare },
  // ── Floor Tom (right, close) ──
  { id:'floortom',name:'Floor\nTom',type:'tom', x:72, y:46, size:19, depth:12, color:['#D1ECFF','#B8DEFF'], glow:'#BAE1FF', play: c => playTom(c, 150, 0.45) },
  // ── Kick (center, closest, big) ──
  { id:'kick',    name:'Kick',      type:'kick', x:50, y:62, size:28, color:['#FFD6E8','#FFC2DA'], glow:'#FFB3D9', play: playKick },
];

const HIT_EMOJIS = ['💥','⭐','✨','🌟','💫','🔥','🎶','🥁','💛'];

// ─── Build Kit ───────────────────────────────────────────────
const kit = document.getElementById('kit');
const drumEls = [];

DRUMS.forEach((drum, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'drum-piece';
  wrap.dataset.index = i;

  if (drum.type === 'cymbal') {
    // Stand
    const stand = document.createElement('div');
    stand.className = 'cymbal-stand';
    stand.style.cssText = `
      width: 3px; height: ${drum.size * 1.8}vmin;
      background: linear-gradient(180deg, #888 0%, #555 100%);
      left: calc(${drum.x}vw - 1.5px);
      top: calc(${drum.y}vh);
      position: absolute;
    `;
    wrap.appendChild(stand);

    // Disc
    const disc = document.createElement('div');
    disc.className = 'cymbal-disc';
    const [c1, c2] = drum.color;
    disc.style.cssText = `
      width: ${drum.size}vmin; height: ${drum.size * 0.45}vmin;
      left: calc(${drum.x}vw - ${drum.size/2}vmin);
      top: calc(${drum.y}vh - ${drum.size*0.225}vmin);
      background: radial-gradient(ellipse at 40% 40%, ${c1} 0%, ${c2} 60%, ${c2}bb 100%);
      box-shadow: 0 3px 12px rgba(0,0,0,0.2), inset 0 -1px 6px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.2);
    `;
    // Bell
    const bell = document.createElement('div');
    bell.className = 'cymbal-bell';
    bell.style.background = `radial-gradient(circle, ${c1} 0%, ${c2} 100%)`;
    bell.style.boxShadow = '0 1px 4px rgba(0,0,0,0.15)';
    bell.style.left = '41%'; bell.style.top = '30%';
    disc.appendChild(bell);
    // Label
    const lbl = document.createElement('div');
    lbl.className = 'drum-head-label';
    lbl.textContent = drum.name;
    lbl.style.position = 'absolute'; lbl.style.bottom = '-1.5vmin'; lbl.style.width = '100%';
    disc.appendChild(lbl);
    // Emoji
    const em = document.createElement('div');
    em.className = 'drum-head-emoji';
    em.style.position = 'absolute'; em.style.top = '15%'; em.style.left = '50%'; em.style.transform = 'translateX(-50%)';
    disc.appendChild(em);

    wrap.appendChild(disc);

  } else if (drum.type === 'tom') {
    const [c1, c2] = drum.color;
    const sz = drum.size;
    const dp = drum.depth || 6;

    // Shell (visible rim)
    const shell = document.createElement('div');
    shell.className = 'drum-shell';
    shell.style.cssText = `
      width: ${sz}vmin; height: ${dp}vmin;
      left: calc(${drum.x}vw - ${sz/2}vmin);
      top: calc(${drum.y}vh);
      background: linear-gradient(180deg, ${c2} 0%, ${c2}99 100%);
      border: 2px solid rgba(255,255,255,0.12);
      border-top: none;
      border-radius: 0 0 50% 50% / 0 0 100% 100%;
    `;
    wrap.appendChild(shell);

    // Head (top ellipse)
    const head = document.createElement('div');
    head.className = 'drum-head';
    head.style.cssText = `
      width: ${sz}vmin; height: ${sz * 0.5}vmin;
      left: calc(${drum.x}vw - ${sz/2}vmin);
      top: calc(${drum.y}vh - ${sz*0.25}vmin);
      background: radial-gradient(ellipse at 42% 42%, ${c1} 0%, ${c2} 65%, ${c2}cc 100%);
      box-shadow: 0 4px 14px rgba(0,0,0,0.18), inset 0 -2px 8px rgba(0,0,0,0.06);
      border: 2px solid rgba(255,255,255,0.15);
    `;
    // Rim highlight
    const rim = document.createElement('div');
    rim.style.cssText = `
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
      pointer-events: none;
    `;
    head.appendChild(rim);
    // Label
    const lbl = document.createElement('div');
    lbl.className = 'drum-head-label';
    lbl.style.whiteSpace = 'pre-line';
    lbl.textContent = drum.name;
    head.appendChild(lbl);
    // Emoji
    const em = document.createElement('div');
    em.className = 'drum-head-emoji';
    head.appendChild(em);

    wrap.appendChild(head);

  } else if (drum.type === 'kick') {
    const [c1, c2] = drum.color;
    const sz = drum.size;

    // The kick drum shell seen from front (oval due to perspective)
    const shell = document.createElement('div');
    shell.className = 'kick-shell';
    shell.style.cssText = `
      width: ${sz}vmin; height: ${sz * 0.55}vmin;
      left: calc(${drum.x}vw - ${sz/2}vmin);
      top: calc(${drum.y}vh - ${sz*0.275}vmin);
      background: radial-gradient(ellipse at 45% 45%, ${c1} 0%, ${c2} 55%, ${c2}bb 100%);
      box-shadow: 0 6px 24px rgba(0,0,0,0.25), inset 0 -4px 12px rgba(0,0,0,0.1);
      border: 3px solid rgba(255,255,255,0.12);
      border-radius: 50%;
    `;
    // Resonant head (slightly inset circle)
    const resHead = document.createElement('div');
    resHead.className = 'kick-head';
    resHead.style.cssText = `
      width: 82%; height: 82%; top: 9%; left: 9%;
      background: radial-gradient(ellipse at 45% 45%, ${c1}ee 0%, ${c2}cc 100%);
      border: 2px solid rgba(255,255,255,0.1);
    `;
    shell.appendChild(resHead);
    // Port hole
    const port = document.createElement('div');
    port.className = 'kick-port';
    port.style.cssText = `
      background: radial-gradient(circle, rgba(20,20,40,0.6) 0%, rgba(20,20,40,0.3) 100%);
      left: 55%; top: 50%; transform: translate(-50%, -50%);
    `;
    shell.appendChild(port);
    // Label
    const lbl = document.createElement('div');
    lbl.className = 'drum-head-label';
    lbl.style.cssText = 'position:absolute; width:100%; bottom:18%; font-size: clamp(0.7rem, 1.4vw, 1.1rem);';
    lbl.textContent = drum.name;
    shell.appendChild(lbl);
    // Emoji
    const em = document.createElement('div');
    em.className = 'drum-head-emoji';
    em.style.cssText = 'position:absolute; top:22%; left:50%; transform:translateX(-50%);';
    shell.appendChild(em);
    // Pedal
    const pedal = document.createElement('div');
    pedal.className = 'pedal';
    pedal.style.cssText = `
      width: 4vmin; height: 6vmin;
      left: calc(${drum.x}vw - 2vmin);
      top: calc(${drum.y}vh + ${sz*0.275}vmin);
      background: linear-gradient(180deg, #777 0%, #444 100%);
      border-radius: 2px 2px 4px 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    `;
    wrap.appendChild(pedal);
    wrap.appendChild(shell);
  }

  kit.appendChild(wrap);
  drumEls.push(wrap);
});

// ─── Visual Effects ──────────────────────────────────────────
function spawnHitEmoji(el) {
  const rect = el.getBoundingClientRect();
  const e = document.createElement('div');
  e.className = 'hit-emoji';
  e.textContent = HIT_EMOJIS[Math.floor(Math.random()*HIT_EMOJIS.length)];
  e.style.left = (rect.left + rect.width*(0.3+Math.random()*0.4)) + 'px';
  e.style.top = (rect.top + rect.height*0.1) + 'px';
  document.body.appendChild(e);
  setTimeout(()=>e.remove(), 1200);
}
function spawnRipple(el, drum) {
  const rect = el.getBoundingClientRect();
  const r = document.createElement('div');
  r.className = 'hit-ripple';
  r.style.background = drum.glow;
  const sz = Math.max(rect.width, rect.height);
  r.style.width = sz+'px'; r.style.height = sz+'px';
  r.style.left = (rect.left+rect.width/2-sz/2)+'px';
  r.style.top = (rect.top+rect.height/2-sz/2)+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(), 700);
}
function spawnShockwave(el, drum) {
  const rect = el.getBoundingClientRect();
  const ring = document.createElement('div');
  ring.className = 'shockwave';
  ring.style.borderColor = drum.glow;
  const sz = Math.max(rect.width,rect.height)*0.8;
  ring.style.width=sz+'px'; ring.style.height=sz+'px';
  ring.style.left=(rect.left+rect.width/2-sz/2)+'px';
  ring.style.top=(rect.top+rect.height/2-sz/2)+'px';
  document.body.appendChild(ring);
  setTimeout(()=>ring.remove(), 600);
}

function hitDrum(index) {
  if (index < 0 || index >= DRUMS.length) return;
  const drum = DRUMS[index];
  const el = drumEls[index];
  const ctx = ensureAudioCtx();
  drum.play(ctx);
  el.classList.add('hit');
  spawnHitEmoji(el);
  spawnRipple(el, drum);
  if (drum.type !== 'cymbal') spawnShockwave(el, drum);
  setTimeout(() => el.classList.remove('hit'), 150);
}

// ─── Input ───────────────────────────────────────────────────
function keyToDrumIndex(key) {
  let h = 0; const s = key.toLowerCase();
  for (let i=0;i<s.length;i++) h = ((h<<5)-h+s.charCodeAt(i))|0;
  return ((h%DRUMS.length)+DRUMS.length)%DRUMS.length;
}

kit.addEventListener('pointerdown', (e) => {
  const p = e.target.closest('.drum-piece');
  if (!p) return;
  hitDrum(parseInt(p.dataset.index));
});

// ─── Fullscreen / Lock ───────────────────────────────────────
let isLocked = false, mouseTimer = null;
const lockBtn = document.getElementById('lock-btn');
const fullscreenBtn = document.getElementById('fullscreen-btn');

function updateFullscreenBtnVisibility() {
  fullscreenBtn.classList.toggle('hidden-fs', !!document.fullscreenElement);
}
function showControls() {
  lockBtn.classList.add('visible');
  if (!document.fullscreenElement) fullscreenBtn.classList.add('visible');
  clearTimeout(mouseTimer);
  mouseTimer = setTimeout(() => {
    if (!isLocked) lockBtn.classList.remove('visible');
    fullscreenBtn.classList.remove('visible');
  }, 3000);
}
document.addEventListener('mousemove', showControls);
fullscreenBtn.addEventListener('click', e => { e.stopPropagation(); document.documentElement.requestFullscreen().catch(()=>{}); });

lockBtn.addEventListener('click', e => {
  e.stopPropagation();
  isLocked = !isLocked;
  lockBtn.classList.toggle('locked', isLocked);
  lockBtn.classList.toggle('unlocked', !isLocked);
  lockBtn.title = isLocked ? 'Fullscreen locked (click to unlock)' : 'Lock fullscreen';
  document.getElementById('lock-path').setAttribute('d', isLocked
    ? 'M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z'
    : 'M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z'
  );
});

// ─── Key Interception ────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Escape' && isLocked) {
    e.preventDefault(); e.stopPropagation();
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    return;
  }
  if (document.fullscreenElement && e.key !== 'Escape') { e.preventDefault(); e.stopPropagation(); }
  hitDrum(keyToDrumIndex(e.key));
}
document.addEventListener('keydown', handleKey, true);
document.addEventListener('keyup', e => { if (document.fullscreenElement && e.key!=='Escape') { e.preventDefault(); e.stopPropagation(); } }, true);
document.addEventListener('keypress', e => { if (document.fullscreenElement) { e.preventDefault(); e.stopPropagation(); } }, true);
document.addEventListener('contextmenu', e => { if (document.fullscreenElement) e.preventDefault(); });
document.addEventListener('auxclick', e => { if (document.fullscreenElement) e.preventDefault(); });
document.addEventListener('dragstart', e => { if (document.fullscreenElement) e.preventDefault(); });

// ─── Keyboard Lock API ──────────────────────────────────────
const SYSTEM_KEYS_TO_LOCK = [
  'F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12',
  'MetaLeft','MetaRight','AltLeft','AltRight','ControlLeft','ControlRight',
  'Tab','CapsLock','BrowserBack','BrowserForward','BrowserRefresh',
  'BrowserHome','LaunchMail','MediaPlayPause','MediaTrackNext',
  'MediaTrackPrevious','MediaStop','AudioVolumeUp','AudioVolumeDown','AudioVolumeMute',
];
function lockKeyboard() { if (navigator.keyboard?.lock) navigator.keyboard.lock(SYSTEM_KEYS_TO_LOCK).catch(()=>{}); }
function unlockKeyboard() { if (navigator.keyboard?.unlock) navigator.keyboard.unlock(); }

document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) lockKeyboard();
  else { unlockKeyboard(); if (isLocked) document.documentElement.requestFullscreen().catch(()=>{}); }
  updateFullscreenBtnVisibility();
});

// ─── Splash ──────────────────────────────────────────────────
const splash = document.getElementById('splash');
function dismissSplash() {
  ensureAudioCtx();
  document.documentElement.requestFullscreen().catch(()=>{});
  splash.style.opacity = '0';
  setTimeout(() => { splash.style.display = 'none'; }, 500);
}
splash.addEventListener('click', dismissSplash);
document.addEventListener('keydown', function sD(e) {
  if (splash.style.display !== 'none') dismissSplash();
}, { once: true });

// ─── Stars ───────────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random()*4+1;
  const cols = ['#fff','#ffeaa7','#dfe6e9','#74b9ff','#a29bfe'];
  s.style.width = sz+'px'; s.style.height = sz+'px';
  s.style.background = cols[Math.floor(Math.random()*cols.length)];
  s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*50+'%';
  s.style.animationDelay = (Math.random()*3)+'s';
  s.style.animationDuration = (Math.random()*2+1.5)+'s';
  starsEl.appendChild(s);
}
</script>
